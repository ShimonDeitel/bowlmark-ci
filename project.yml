name: Bowlmark
options:
  bundleIdPrefix: com.shimondeitel.bowlmark
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Bowlmark:
    type: application
    platform: iOS
    sources:
      - path: Bowlmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bowlmark
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Bowlmark/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BowlmarkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BowlmarkTests
      - path: Bowlmark.storekit
    dependencies:
      - target: Bowlmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bowlmark.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BowlmarkUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BowlmarkUITests
    dependencies:
      - target: Bowlmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bowlmark.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Bowlmark:
    build:
      targets:
        Bowlmark: all
        BowlmarkTests: [test]
        BowlmarkUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Bowlmark.storekit
    test:
      config: Debug
      storeKitConfiguration: Bowlmark.storekit
      targets:
        - BowlmarkTests
        - BowlmarkUITests
    archive:
      config: Release
